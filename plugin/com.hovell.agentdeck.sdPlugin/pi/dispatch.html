<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dispatch</title>
    <style>
      body { font: 13px/1.5 "Segoe UI", system-ui, sans-serif; color: #d8d8d8; background: #2d2d2d; padding: 12px; }
      label { display: block; margin: 12px 0 4px; color: #969696; }
      input, textarea { width: 100%; box-sizing: border-box; background: #3d3d3d; border: 1px solid #4d4d4d;
        border-radius: 4px; color: #eee; padding: 6px; font: inherit; }
      textarea { min-height: 72px; resize: vertical; }
      .hint { color: #7a7a7a; font-size: 11px; margin-top: 4px; }
    </style>
  </head>
  <body>
    <label for="label">Key label</label>
    <input id="label" placeholder="RUN TESTS" />

    <label for="prompt">Prompt or slash command</label>
    <textarea id="prompt" placeholder="/code-review high"></textarea>
    <div class="hint">Sent to a fresh headless run: <code>claude -p "…"</code></div>

    <label for="cwd">Working directory</label>
    <input id="cwd" placeholder="defaults to the active session" />

    <script>
      let ws, ctx;
      const fields = ['label', 'prompt', 'cwd'];

      function connectElgatoStreamDeckSocket(port, uuid, registerEvent, _info, actionInfo) {
        ctx = uuid;
        ws = new WebSocket('ws://127.0.0.1:' + port);
        const settings = JSON.parse(actionInfo).payload.settings ?? {};
        ws.onopen = () => {
          ws.send(JSON.stringify({ event: registerEvent, uuid }));
          for (const f of fields) document.getElementById(f).value = settings[f] ?? '';
        };
      }

      function save() {
        if (!ws) return;
        const payload = {};
        for (const f of fields) payload[f] = document.getElementById(f).value;
        ws.send(JSON.stringify({ event: 'setSettings', context: ctx, payload }));
      }

      for (const f of fields) document.addEventListener('DOMContentLoaded', () =>
        document.getElementById(f).addEventListener('change', save));
    </script>
  </body>
</html>
